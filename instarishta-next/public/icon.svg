<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="InstaRishta">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E3932"/>
      <stop offset="100%" stop-color="#0a1f1a"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#cba258"/>
      <stop offset="50%" stop-color="#e8c97a"/>
      <stop offset="100%" stop-color="#cba258"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00C87A"/>
      <stop offset="100%" stop-color="#00754A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Gold wedding ring -->
  <circle cx="256" cy="248" r="128" fill="none" stroke="url(#ring)" stroke-width="26" opacity="0.95"/>
  <circle cx="256" cy="248" r="100" fill="none" stroke="url(#ring)" stroke-width="5" opacity="0.25"/>

  <!-- Diamond top -->
  <polygon points="256,88 282,124 256,148 230,124" fill="url(#ring)"/>
  <polygon points="256,96 275,124 256,140 237,124" fill="white" opacity="0.2"/>

  <!-- Mint green inner circle fill (subtle) -->
  <circle cx="256" cy="248" r="98" fill="url(#accent)" opacity="0.07"/>

  <!-- "IR" clean monogram -->
  <!-- I -->
  <rect x="210" y="200" width="18" height="96" rx="9" fill="white" opacity="0.95"/>
  <!-- R stem -->
  <rect x="240" y="200" width="18" height="96" rx="0" fill="white" opacity="0.95"/>
  <!-- R bowl -->
  <path d="M258 200 h24 a24 24 0 0 1 0 48 h-24" fill="none" stroke="white" stroke-width="18" stroke-linecap="round" opacity="0.95"/>
  <!-- R leg -->
  <path d="M282 248 l26 48" stroke="white" stroke-width="18" stroke-linecap="round" opacity="0.95"/>

  <!-- Decorative mint dots bottom -->
  <circle cx="226" cy="400" r="7" fill="url(#accent)" opacity="0.6"/>
  <circle cx="249" cy="400" r="7" fill="url(#ring)"   opacity="0.6"/>
  <circle cx="272" cy="400" r="7" fill="url(#accent)" opacity="0.6"/>
  <circle cx="295" cy="400" r="7" fill="url(#ring)"   opacity="0.6"/>
</svg>
