<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Rishtey — Enhanced</title>
    <meta name="description"
      content="Find your perfect match on Live Rishtey — enhanced theme with animations, theme toggle and lazy blur-up." />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap"
      rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400..700&display=swap"
      rel="stylesheet">

    <style>
      /* Theme tokens */
      :root {
        --bg: #f3f7fb;
        --surface: #ffffff;
        --muted: #64748b;
        --accent: #6d28d9;
        /* primary */
        --accent-2: #4f46e5;
        /* secondary */
        --urgent: #ffb020;
        --glass: rgba(255, 255, 255, 0.6);
        --text: #0f172a;
        --card-shadow: 0 12px 32px rgba(2, 6, 23, 0.06);
        --ease-quick: cubic-bezier(.2, .9, .3, 1);
      }

      [data-theme="dark"] {
        --bg: #0b1020;
        --surface: #0f1724;
        --muted: #9aa6bf;
        --accent: #8b5cf6;
        --accent-2: #7c3aed;
        --urgent: #f59e0b;
        --glass: rgba(255, 255, 255, 0.04);
        --text: #e6eef8;
        --card-shadow: 0 10px 30px rgba(2, 6, 23, 0.5);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0
      }

      body {
        font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Noto Sans', sans-serif;
        background: var(--bg);
        color: var(--text);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale
      }

      /* Simple layout utilities (kept minimal) */
      .container {
        max-width: 1100px;
        margin: 0 auto;
        padding: 16px
      }

      .flex {
        display: flex
      }

      .items-center {
        align-items: center
      }

      .justify-between {
        justify-content: space-between
      }

      .gap-3 {
        gap: 0.75rem
      }

      /* Card */
      .card {
        background: var(--surface);
        border-radius: 12px;
        box-shadow: var(--card-shadow);
        padding: 16px;
        transition: transform .28s var(--ease-quick), box-shadow .28s;
      }

      .card:hover {
        transform: translateY(-6px);
        box-shadow: 0 22px 48px rgba(15, 23, 42, 0.12)
      }

      /* FAB with pulse */
      .fab {
        position: fixed;
        right: 18px;
        bottom: 22%;
        width: 56px;
        height: 56px;
        border-radius: 999px;
        background: linear-gradient(135deg, var(--accent-2), var(--accent));
        color: #fff;
        border: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        z-index: 1300;
        box-shadow: 0 12px 34px rgba(79, 70, 229, 0.14);
        cursor: pointer;
        transition: transform .28s var(--ease-quick)
      }

      .fab:hover {
        transform: scale(1.06)
      }

      .fab::after {
        content: "";
        position: absolute;
        inset: -12px;
        border-radius: 999px;
        z-index: -1;
        background: radial-gradient(circle, rgba(99, 102, 241, 0.12), rgba(99, 102, 241, 0));
        filter: blur(8px);
        animation: fabPulse 3s infinite
      }

      @keyframes fabPulse {
        0% {
          transform: scale(.96);
          opacity: .9
        }

        50% {
          transform: scale(1.06);
          opacity: .6
        }

        100% {
          transform: scale(.96);
          opacity: .9
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .fab::after {
          animation: none
        }
      }

      /* Drawer + overlay */
      .drawer {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        height: 60%;
        max-height: 78vh;
        background: var(--surface);
        border-top-left-radius: 14px;
        border-top-right-radius: 14px;
        box-shadow: 0 -10px 40px rgba(2, 6, 23, 0.06);
        transform: translateY(100%);
        transition: transform .28s var(--ease-quick);
        z-index: 1250
      }

      .drawer.open {
        transform: translateY(0)
      }

      .drawer .drawer-handle {
        width: 56px;
        height: 6px;
        background: rgba(15, 23, 42, 0.06);
        border-radius: 999px;
        margin: 8px auto 12px
      }

      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(2, 6, 23, 0.42);
        backdrop-filter: blur(2px);
        opacity: 0;
        pointer-events: none;
        transition: opacity .28s
      }

      .overlay.show {
        opacity: 1;
        pointer-events: auto
      }

      /* Filter chips */
      .filter-chip {
        display: inline-flex;
        align-items: center;
        background: var(--glass);
        padding: 6px 10px;
        border-radius: 999px;
        font-weight: 600;
        color: var(--text);
        margin-right: 8px;
        transition: transform .18s ease, opacity .18s ease
      }

      .filter-chip .remove {
        margin-left: 8px;
        cursor: pointer;
        opacity: .8
      }

      /* Skeleton */
      .skeleton {
        background: linear-gradient(90deg, #eee, #f6f6f6, #eee);
        background-size: 200% 100%;
        animation: shimmer 1.2s linear infinite;
        border-radius: 10px
      }

      @keyframes shimmer {
        0% {
          background-position: 200% 0
        }

        100% {
          background-position: -200% 0
        }
      }

      /* Lazy blur-up */
      .avatar {
        width: 100%;
        height: 200px;
        border-radius: 8px;
        overflow: hidden;
        background: #eee;
        display: block
      }

      .avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        filter: blur(6px);
        transform: scale(1.02);
        transition: filter .48s ease, transform .48s ease
      }

      .avatar img.loaded {
        filter: blur(0);
        transform: scale(1)
      }

      /* theme toggle */
      .theme-toggle {
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.06);
        padding: 8px;
        border-radius: 8px;
        color: var(--text);
        cursor: pointer
      }

      /* small responsive */
      @media(min-width:768px) {
        .drawer {
          display: none
        }

        .fab {
          display: none
        }
      }

      /* accessibility helpers */
      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        border: 0;
        clip: rect(0 0 0 0);
        overflow: hidden
      }

      /* Decorative blob (non-interactive) */
      .decor-blob {
        position: absolute;
        left: 50%;
        top: 56px;
        transform: translateX(-50%);
        width: 520px;
        height: 220px;
        pointer-events: none;
        opacity: 0.12;
        z-index: 200;
        filter: blur(22px) saturate(1.05);
      }

      @media (max-width: 640px) {
        .decor-blob {
          width: 360px;
          height: 160px;
          top: 40px;
          opacity: 0.14
        }
      }
    </style>
  </head>

  <body data-theme="light">
    <div class="decor-blob" aria-hidden="true">
      <!-- subtle gradient blob -->
      <svg width="100%" height="100%" viewBox="0 0 800 320" preserveAspectRatio="xMidYMid slice"
        xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
          <linearGradient id="g1" x1="0" x2="1">
            <stop offset="0%" stop-color="#7c3aed" />
            <stop offset="100%" stop-color="#4f46e5" />
          </linearGradient>
        </defs>
        <path fill="url(#g1)"
          d="M182.2,23.1C228.8,5.3,292.2-6.4,350.6,12.9C408.9,32.3,460.9,68.1,503.3,104.1C545.6,140.1,578.5,176.2,577.1,214.9C575.8,253.6,540.1,294,498.3,303.6C456.6,313.3,408.8,292.1,362.1,279.9C315.5,267.7,269,264.6,224.6,246.9C180.2,229.2,137.8,196.8,107.2,161.4C76.7,126,57.8,87.5,70.4,56.2C83,24.9,135.6,40.9,182.2,23.1Z" />
      </svg>
    </div>

    <div class="container">
      <div class="flex justify-between items-center mb-4">
        <h1 class="text-xl font-semibold">InstaRishta</h1>
        <div class="flex items-center gap-3">
          <button id="themeToggle" class="theme-toggle" aria-pressed="false">Toggle theme</button>
          <a href="https://telegram.me/liverishtey" class="theme-toggle">Post Ad</a>
        </div>
      </div>

      <div id="appliedFilters" class="mb-4">
        <div id="filterBadges" class="flex"></div>
      </div>

      <div id="userList" class="grid"
        style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px">
        <!-- cards will render here -->
      </div>

      <div id="loading" class="mt-6">
        <div class="skeleton" style="height:120px;width:100%;border-radius:12px"></div>
      </div>
    </div>

    <!-- Mobile Drawer -->
    <div id="mobileDrawer" class="drawer" aria-hidden="true">
      <div class="p-4">
        <div class="drawer-handle" aria-hidden="true"></div>
        <h2 class="text-lg font-semibold">Filters</h2>
        <div style="margin-top:12px">
          <input id="mobileSearchInput" placeholder="Search..."
            style="width:100%;padding:10px;border-radius:8px;border:1px solid rgba(15,23,42,0.06)" />
        </div>
        <div style="margin-top:12px">
          <button id="closeDrawer"
            style="width:100%;padding:12px;border-radius:8px;background:var(--accent);color:#fff;border:none">Close
            Filters</button>
        </div>
      </div>
    </div>
    <div id="drawerOverlay" class="overlay" aria-hidden="true"></div>

    <button id="openDrawer" class="fab" aria-label="Open filters">⚙️</button>

    <script>
      // Simple data set for demo (no avatars intentionally)
      const users = Array.from({ length: 9 }).map((_, i) => ({ id: 1000 + i, name: `Profile ${i + 1}`, urgent: Math.random() > 0.8, education: ['Graduate', 'Engineer', 'Doctor'][i % 3] }));

      const userList = document.getElementById('userList');
      const loadingEl = document.getElementById('loading');
      const openDrawerBtn = document.getElementById('openDrawer');
      const closeDrawerBtn = document.getElementById('closeDrawer');
      const drawer = document.getElementById('mobileDrawer');
      const overlay = document.getElementById('drawerOverlay');
      const themeToggle = document.getElementById('themeToggle');

      // Render cards (with blur-up placeholder behaviour simulated)
      function createCard(u) {
        const card = document.createElement('div'); card.className = 'card';
        const avatarWrap = document.createElement('div'); avatarWrap.className = 'avatar';
        const img = document.createElement('img');
        // no real src; keep a small data-URI placeholder to simulate loading behavior
        img.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400"><rect width="100%" height="100%" fill="%23e6e9f0"/></svg>';
        img.alt = u.name;
        img.onload = () => { img.classList.add('loaded') }
        avatarWrap.appendChild(img);
        card.appendChild(avatarWrap);
        const title = document.createElement('h3'); title.textContent = u.name; title.style.marginTop = '10px'; title.style.fontWeight = '700';
        card.appendChild(title);
        const meta = document.createElement('div'); meta.style.marginTop = '6px'; meta.innerHTML = `<span style="font-weight:600;color:var(--muted)">ID: ${u.id}</span>`;
        card.appendChild(meta);
        // urgent chip
        if (u.urgent) { const chip = document.createElement('span'); chip.className = 'filter-chip'; chip.textContent = 'URGENT'; chip.style.background = 'var(--urgent)'; chip.style.color = '#111'; chip.style.marginTop = '8px'; card.appendChild(chip); }
        return card;
      }

      function renderUsers() {
        userList.innerHTML = '';
        users.forEach(u => userList.appendChild(createCard(u)));
        loadingEl.style.display = 'none';
      }

      // Lazy-load simulation: after a short delay show loaded images
      setTimeout(() => { renderUsers() }, 800);

      // Drawer open/close
      function toggleDrawer(open) {
        if (open) { drawer.classList.add('open'); overlay.classList.add('show'); drawer.setAttribute('aria-hidden', 'false'); trapFocus(true); openDrawerBtn.style.display = 'none'; }
        else { drawer.classList.remove('open'); overlay.classList.remove('show'); drawer.setAttribute('aria-hidden', 'true'); trapFocus(false); openDrawerBtn.style.display = 'inline-flex'; }
      }
      openDrawerBtn.addEventListener('click', () => toggleDrawer(true));
      closeDrawerBtn.addEventListener('click', () => toggleDrawer(false));
      overlay.addEventListener('click', () => toggleDrawer(false));

      // Focus trap for drawer (small utility)
      function trapFocus(enable) {
        const focusable = 'a, button, input, select, textarea, [tabindex]:not([tabindex="-1"])';
        const nodes = Array.from(drawer.querySelectorAll(focusable));
        if (enable) { if (nodes.length) nodes[0].focus(); drawer._focusHandler = function (e) { if (e.key === 'Tab') { const first = nodes[0], last = nodes[nodes.length - 1]; if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); } else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); } } else if (e.key === 'Escape') { toggleDrawer(false); } }; document.addEventListener('keydown', drawer._focusHandler); }
        else { document.removeEventListener('keydown', drawer._focusHandler); drawer._focusHandler = null; }
      }

      // Theme toggle (persist in localStorage)
      function setTheme(t) { document.body.setAttribute('data-theme', t); localStorage.setItem('site-theme', t); themeToggle.setAttribute('aria-pressed', t === 'dark'); }
      themeToggle.addEventListener('click', () => setTheme(document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light'));
      // load saved theme
      const saved = localStorage.getItem('site-theme'); if (saved) setTheme(saved);

      // lazy image blur-up observer (if we had remote images)
      if ('IntersectionObserver' in window) {
        const imgs = document.querySelectorAll('.avatar img[data-src]');
        const io = new IntersectionObserver((entries) => { entries.forEach(e => { if (e.isIntersecting) { const img = e.target; img.src = img.getAttribute('data-src'); img.onload = () => img.classList.add('loaded'); io.unobserve(img); } }); }, { rootMargin: '100px' });
        imgs.forEach(i => io.observe(i));
      }

      // Simple accessibility: show applied filters region role
      document.getElementById('appliedFilters').setAttribute('role', 'region');
      document.getElementById('appliedFilters').setAttribute('aria-label', 'Applied filters');

      // Optional: add a few demo filter chips
      const filterBadges = document.getElementById('filterBadges');['Graduate', 'Male', 'Urgent'].forEach(t => { const b = document.createElement('div'); b.className = 'filter-chip'; b.textContent = t; const rem = document.createElement('span'); rem.className = 'remove'; rem.textContent = '✕'; rem.onclick = () => b.remove(); b.appendChild(rem); filterBadges.appendChild(b); });
    </script>
  </body>

</html>
