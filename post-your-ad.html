<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="robots" content="noindex,nofollow"><meta name="referrer" content="strict-origin-when-cross-origin"><title>Submit Your Profile Ad | InstaRishta</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Naskh+Arabic:wght@400;600;700&family=Noto+Nastaliq+Urdu:wght@400..700&display=swap"><link rel="stylesheet" href="styles/instarishta.css"> <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        min-height: 100vh;
        font-family: "Inter", "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(79, 70, 229, 0.18), transparent 30%),
          radial-gradient(circle at top right, rgba(168, 85, 247, 0.12), transparent 32%),
          linear-gradient(180deg, #f8fbff 0%, #edf2ff 100%);
      }

      .page {
        min-height: 100vh;
        padding: 18px;
        display: grid;
        place-items: center;
      }

      .shell {
        width: min(760px, 100%);
        overflow: hidden;
        border: 1px solid var(--border);
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.76);
        -webkit-backdrop-filter: blur(22px) saturate(165%);
        backdrop-filter: blur(22px) saturate(165%);
        box-shadow: 0 28px 80px rgba(79, 70, 229, 0.12), var(--card-shadow);
      }

      .hero {
        padding: 24px 24px 20px;
        border-bottom: 1px solid var(--border);
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.94), rgba(255, 255, 255, 0.72));
      }

      .kicker {
        margin: 0 0 10px;
        color: var(--accent-2);
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .hero h1 {
        margin: 0;
        font-size: clamp(1.85rem, 5vw, 3rem);
        line-height: 1.05;
        letter-spacing: -0.04em;
      }

      .hero p {
        margin: 12px 0 0;
        color: var(--text-soft);
        line-height: 1.7;
        max-width: 72ch;
      }

      .form {
        display: grid;
        gap: 14px;
        padding: 22px 24px 24px;
      }

      .field-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .field {
        display: grid;
        gap: 8px;
      }

      .field.full {
        grid-column: 1 / -1;
      }

      .field label {
        font-size: 0.93rem;
        font-weight: 700;
        color: var(--text-soft);
      }

      .field input,
      .field textarea,
      .field select {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.85);
        color: var(--text);
        padding: 13px 14px;
        font: inherit;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.45);
      }

      .field textarea {
        min-height: 170px;
        resize: vertical;
        line-height: 1.7;
        font-family: "Inter", "Noto Naskh Arabic", sans-serif;
      }

      .field select {
        appearance: none;
        background-image:
          linear-gradient(45deg, transparent 50%, currentColor 50%),
          linear-gradient(135deg, currentColor 50%, transparent 50%);
        background-position:
          calc(100% - 18px) calc(1em + 4px),
          calc(100% - 12px) calc(1em + 4px);
        background-size: 6px 6px, 6px 6px;
        background-repeat: no-repeat;
        padding-right: 40px;
      }

      .field input:focus,
      .field textarea:focus,
      .field select:focus {
        outline: none;
        border-color: rgba(79, 70, 229, 0.45);
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.12);
      }

      .check-row {
        display: flex;
        gap: 12px;
        align-items: flex-start;
        padding: 14px 16px;
        border: 1px solid var(--border);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.72);
        cursor: pointer;
      }

      .check-row input {
        margin-top: 3px;
        width: 18px;
        height: 18px;
        accent-color: var(--accent-2);
        flex-shrink: 0;
      }

      .check-row strong {
        display: block;
        font-size: 0.96rem;
        color: var(--text);
      }

      .check-row small {
        display: block;
        margin-top: 4px;
        color: var(--muted);
        line-height: 1.5;
      }

      .field-helper {
        margin: 0;
        color: var(--muted);
        font-size: 0.88rem;
        line-height: 1.5;
      }

      .field-grid--contact {
        align-items: stretch;
      }

      .honeypot {
        position: absolute;
        inset-inline-start: -9999px;
        width: 1px;
        height: 1px;
        overflow: hidden;
        opacity: 0;
        pointer-events: none;
      }

      .submit-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        border: 0;
        border-radius: 16px;
        padding: 12px 18px;
        color: #fff;
        background: linear-gradient(135deg, var(--accent-2), var(--accent));
        font: inherit;
        font-weight: 800;
        letter-spacing: 0.01em;
        cursor: pointer;
        box-shadow: 0 16px 30px rgba(79, 70, 229, 0.22);
        transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
      }

      .submit-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 20px 36px rgba(79, 70, 229, 0.28);
      }

      .submit-btn:disabled {
        cursor: wait;
        opacity: 0.72;
        transform: none;
      }

      .status {
        min-height: 24px;
        border-radius: 14px;
        padding: 12px 14px;
        font-size: 0.95rem;
        line-height: 1.5;
        color: var(--text-soft);
        background: rgba(255, 255, 255, 0.62);
        border: 1px solid transparent;
      }

      .status[data-tone="success"] {
        color: #166534;
        background: rgba(240, 253, 244, 0.9);
        border-color: rgba(34, 197, 94, 0.2);
      }

      .status[data-tone="warning"] {
        color: #b45309;
        background: rgba(255, 247, 237, 0.9);
        border-color: rgba(245, 158, 11, 0.2);
      }

      .status[data-tone="error"] {
        color: #b91c1c;
        background: rgba(254, 242, 242, 0.92);
        border-color: rgba(239, 68, 68, 0.22);
      }

      .footnote {
        margin: 0;
        padding: 0 24px 24px;
        color: var(--muted);
        font-size: 0.9rem;
        line-height: 1.6;
      }

      @media (max-width: 640px) {
        .page {
          padding: 10px;
        }

        .hero,
        .form,
        .footnote {
          padding-left: 16px;
          padding-right: 16px;
        }

        .field-grid {
          grid-template-columns: 1fr;
        }

        .shell {
          border-radius: 22px;
        }
      }
    </style> </head><body><main class="page"><section class="shell" aria-labelledby="postAdTitle"><header class="hero"><p class="kicker">Post your ad</p><h1 id="postAdTitle">Share your Marriage Ad Details</h1><p>Fill the form below. We will review it and Contact you & Publish it.</p></header><form id="postAdForm" class="form" novalidate><input id="formOpenedAt" name="formOpenedAt" type="hidden" value=""><div class="honeypot" aria-hidden="true"><label for="company">Company</label><input id="company" name="company" type="text" autocomplete="off" tabindex="-1" maxlength="120" value=""></div><div class="field full"><label for="name">Full Name *</label><input id="name" name="name" type="text" autocomplete="name" required maxlength="120" placeholder="Enter your full name"></div><div class="field-grid"><div class="field"><label for="phone">Phone Number *</label><input id="phone" name="phone" type="tel" autocomplete="tel" required maxlength="32" placeholder="Enter your phone number"></div><div class="field"><label for="whatsapp">WhatsApp Number *</label><input id="whatsapp" name="whatsapp" type="tel" autocomplete="tel" required maxlength="32" placeholder="Enter your WhatsApp number"></div></div><div class="field full"><label for="bioData">Full Biodata *</label> <textarea id="bioData" name="bioData" required maxlength="2500" dir="auto" placeholder="Share age, education, occupation, location, family background, and anything you want us to know."></textarea> </div><div class="field-grid field-grid--contact"><label class="check-row" for="directContact"><input id="directContact" name="directContact" type="checkbox" checked><span><strong>Allow direct contact</strong><small>If enabled, we can contact the applicant directly for review.</small></span></label><div class="field"><label for="guardianConnect">Wali / parent / guardian connect</label><select id="guardianConnect" name="guardianConnect"><option value="none">None</option><option value="wali">Wali</option><option value="parent">Parent</option><option value="guardian">Guardian</option><option value="family">Family member</option></select><p class="field-helper">Use this when a family member should be contacted first.</p></div></div><label class="check-row full" for="urgent"><input id="urgent" name="urgent" type="checkbox"><span><strong>Mark as urgent listing</strong><small>We will tag your submission for quicker review.</small></span></label><button id="submitBtn" class="submit-btn" type="submit">Submit</button><div id="submitStatus" class="status" role="status" aria-live="polite"></div></form></section></main> <script>
      const DEFAULT_PROFILE_AD_ENDPOINT = 'https://instarishta-profile-relay.instarishtalead.workers.dev/api/submit-profile-ad';
      const form = document.getElementById('postAdForm');
      const submitBtn = document.getElementById('submitBtn');
      const submitStatus = document.getElementById('submitStatus');
      const formOpenedAt = document.getElementById('formOpenedAt');
      const honeypot = document.getElementById('company');

      function setStatus(message, tone = '') {
        submitStatus.textContent = message;
        submitStatus.dataset.tone = tone;
      }

      function setBusy(isBusy) {
        submitBtn.disabled = isBusy;
        submitBtn.textContent = isBusy ? 'Sending...' : 'Submit privately';
      }

      function getFieldValue(id) {
        const element = document.getElementById(id);
        return element ? element.value.trim() : '';
      }

      function resolveEndpoint() {
        try {
          const parentConfig = window.parent !== window
            ? window.parent?.INSTA_RISHTA_CONFIG?.profileAdEndpoint
            : '';
          const localConfig = window.INSTA_RISHTA_CONFIG?.profileAdEndpoint;
          const configured = String(parentConfig || localConfig || '').trim();
          if (configured) return configured;
        } catch {
          // Ignore cross-window access issues and fall back below.
        }

        if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
          return '/api/submit-profile-ad';
        }

        return DEFAULT_PROFILE_AD_ENDPOINT;
      }

      function normalizeGuardianConnect(value) {
        const allowed = new Set(['none', 'wali', 'parent', 'guardian', 'family']);
        const normalized = String(value || '').trim().toLowerCase();
        return allowed.has(normalized) ? normalized : 'none';
      }

      function buildSubmissionPayload() {
        return {
          name: getFieldValue('name'),
          phone: getFieldValue('phone'),
          whatsapp: getFieldValue('whatsapp'),
          bioData: getFieldValue('bioData'),
          urgent: document.getElementById('urgent')?.checked === true,
          directContact: document.getElementById('directContact')?.checked === true,
          guardianConnect: normalizeGuardianConnect(document.getElementById('guardianConnect')?.value),
          formOpenedAt: formOpenedAt?.value || String(Date.now()),
          submittedAt: new Date().toISOString(),
          pageUrl: window.location.href,
          referrer: document.referrer || '',
          source: 'post-your-ad',
          honeypot: honeypot?.value || '',
        };
      }

      async function submitPayload(payload) {
        const endpoint = resolveEndpoint();
        const response = await fetch(endpoint, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Accept: 'application/json',
          },
          body: JSON.stringify(payload),
        });

        const rawText = await response.text();
        let data = null;
        try {
          data = rawText ? JSON.parse(rawText) : null;
        } catch {
          data = null;
        }

        if (!response.ok || data?.ok === false) {
          const errorMessage = data?.error || data?.message || rawText || `HTTP ${response.status}`;
          throw new Error(errorMessage);
        }

        return data;
      }

      form.addEventListener('submit', async (event) => {
        event.preventDefault();

        if (!form.checkValidity()) {
          form.reportValidity();
          return;
        }

        const openedAt = Number(formOpenedAt?.value || 0);
        if (Number.isFinite(openedAt) && Date.now() - openedAt < 3500) {
          setStatus('Please take a moment before submitting so we can filter automated spam.', 'warning');
          return;
        }

        const payload = buildSubmissionPayload();

        setBusy(true);
        setStatus('Sending your details to our private review inbox...', 'warning');

        try {
          await submitPayload(payload);
          setStatus('Sent privately. We will review your submission shortly.', 'success');
          form.reset();
          formOpenedAt.value = String(Date.now());
          if (honeypot) honeypot.value = '';
        } catch (error) {
          console.error('Profile ad handoff failed:', error);
          setStatus(error?.message || 'Submission could not be sent right now. Please try again in a little while.', 'error');
        } finally {
          setBusy(false);
        }
      });

      formOpenedAt.value = String(Date.now());
    </script> </body></html>
